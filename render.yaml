services:
  - type: web
    name: codebase-maintainer-agent
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
